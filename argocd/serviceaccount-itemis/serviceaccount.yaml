apiVersion: v1
kind: ServiceAccount
metadata:
  name: itemis
  namespace: telehealth
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: telehealth
  name: secret-reader
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: read-secrets
  namespace: telehealth
subjects:
- kind: ServiceAccount
  name: itemis
  namespace: telehealth
roleRef:
  kind: Role
  name: secret-reader
  apiGroup: rbac.authorization.k8s.io